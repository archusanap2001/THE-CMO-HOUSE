<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE CMO HOUSE</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
   * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #fff;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* Header */
header {
  position: absolute;
  top: 30px;
  left: 60px;
  font-size: 14px;
  letter-spacing: 2px;
}

/* Hero Section */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 60px;
  position: relative;
  z-index: 2;
}

/* Main Heading */
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(40px, 5.5vw, 70px);
  line-height: 1.1;
  white-space: nowrap;
}

/* Sub Text */
.hero p {
  margin-top: 20px;
  color: #aaa;
  font-size: 18px;
  max-width: 500px;
}

/* 🔥 FIXED BUTTON */
.btn {
  margin-top: 40px;
  padding: 12px 22px;
  border: 1px solid #444;
  display: inline-block;
  font-size: 12px;
  letter-spacing: 2px;
  color: #fff;
  text-decoration: none;
  width: fit-content;
  transition: 0.3s;
}

.btn:hover {
  border-color: #fff;
}

/* Glow Effect */
.earth {
  position: absolute;
  bottom: -150px;
  left: 50%;
  transform: translateX(-50%);
  width: 1200px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle at center, rgba(255,255,255,0.3), transparent 70%);
  filter: blur(30px);
  opacity: 0.4;
}

/* Footer */
.footer {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 20px 60px;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: #888;
}

/* Animation */
.hero {
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.footer-right {
  text-align: right;
  line-height: 1.7;
}

.footer-right a {
  color: #777;
  text-decoration: none;
  font-size: 13px;
  transition: 0.3s;
}

.footer-right a:hover {
  color: #fff;
}

.address {
  color: #555;
  font-size: 12px;
  margin-top: 5px;
}
/* 📱 Mobile Responsive */
@media (max-width: 768px) {

  header {
    left: 20px;
    top: 20px;
  }

  .hero {
    padding-left: 20px;
    padding-right: 20px;
  }

  .hero h1 {
    font-size: 36px;
    white-space: normal; /* 🔥 important */
  }

  .hero p {
    font-size: 14px;
  }

  .btn {
    font-size: 11px;
    padding: 10px 18px;
  }

  .footer {
    flex-direction: column;
    gap: 10px;
    padding: 20px;
  }

  .footer-right {
    text-align: left;
  }

}

  </style>
</head>

<body>

<header>THE CMO HOUSE</header>

<div class="hero">
  <h1>Born to Build Brands That Lead.</h1>

  <p>
    Your Marketing Co-Founder
  </p>

  <a href="#" class="btn">COMING SOON</a>
</div>
<div class="earth"></div>
</div><div class="footer">
  <div>THE CMO HOUSE</div>

  <div class="footer-right">
    
    <div>
      <a href="mailto:viney@thecmohouse.com">viney@thecmohouse.com</a>
    </div>

    <div>
      <a href="tel:+918238580001">+91 8238580001</a>
    </div>

    <div class="address">
      B2-205, KrishnaShanti Residency,<br>
      Bavdhan, Pune 411021
    </div>
  </div>
</div>

</body>
</html>
